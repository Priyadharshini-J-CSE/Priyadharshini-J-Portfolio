<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priyadharshini J - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            background: #000;
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
            }
            to {
                transform: translateY(0);
            }
        }

        nav ul {
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style: none;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 10px 30px;
            border: 2px solid #fff;
            border-radius: 30px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        nav a:hover {
            background: #2ecc71;
            border-color: #2ecc71;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            animation: slideInLeft 0.8s ease;
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-100%) translateY(-50%);
            }
            to {
                transform: translateX(0) translateY(-50%);
            }
        }

        .sidebar-icon {
            width: 50px;
            height: 50px;
            background: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar-icon:hover {
            width: 60px;
            background: #27ae60;
        }

        .sidebar-icon svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        /* Home Section */
        #home {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8eef3 100%);
            display: flex;
            align-items: center;
            padding: 100px 50px 50px;
            position: relative;
            overflow: hidden;
        }

        .network-bg {
            position: absolute;
            right: 0;
            top: 0;
            width: 60%;
            height: 100%;
            opacity: 0.3;
        }

        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #7f8c8d;
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #95a5a6, transparent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .home-content {
            position: relative;
            z-index: 10;
            animation: fadeInUp 1s ease;
            padding-left: 30%;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .home-content h1 {
            font-size: 72px;
            font-weight: 300;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .home-content h1 span:first-child {
            font-style: italic;
            font-weight: 400;
        }

        .home-content h1 span:last-child {
            font-weight: 600;
        }

        .tagline {
            color: #2ecc71;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            animation: typing 2s steps(30) 0.5s forwards;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
        }

        @keyframes typing {
            to { width: 100%; }
        }

        .subtitle {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            max-width: 600px;
            margin: 20px 0;
        }

        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .social-icons a {
            width: 50px;
            height: 50px;
            background: #2c3e50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .social-icons a:hover {
            background: #2ecc71;
            transform: translateY(-5px) rotate(360deg);
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
        }

        /* Section Common Styles */
        section {
            min-height: 100vh;
            padding: 100px 50px;
            position: relative;
        }

        .section-title {
            font-size: 80px;
            font-weight: bold;
            color: #2ecc71;
            text-align: center;
            margin-bottom: 80px;
            position: relative;
            display: inline-block;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .section-title::before {
            content: '{';
            position: absolute;
            left: -60px;
            top: 0;
            font-size: 100px;
            color: #000;
        }

        .section-title::after {
            content: '}';
            position: absolute;
            right: -60px;
            top: 0;
            font-size: 100px;
            color: #000;
        }

        .year-badge {
            position: absolute;
            top: -20px;
            right: 20%;
            background: #000;
            color: #fff;
            padding: 10px 30px;
            font-weight: bold;
            transform: rotate(-5deg);
            font-size: 24px;
        }

        /* Projects Section */
        #project {
            background: #fff;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .project-card {
            background: #000;
            border-radius: 15px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            animation: fadeInScale 0.6s ease forwards;
            opacity: 0;
        }

        .project-card:nth-child(1) { animation-delay: 0.1s; }
        .project-card:nth-child(2) { animation-delay: 0.2s; }
        .project-card:nth-child(3) { animation-delay: 0.3s; }
        .project-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .project-window {
            background: linear-gradient(to bottom, #87ceeb 0%, #87ceeb 60%, #90ee90 60%, #90ee90 100%);
            border-radius: 10px;
            padding: 30px 20px;
            position: relative;
            min-height: 200px;
        }

        .window-dots {
            position: absolute;
            top: 10px;
            left: 15px;
            display: flex;
            gap: 8px;
        }

        .dot-red, .dot-yellow, .dot-green {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .clouds {
            position: absolute;
            width: 60px;
            height: 20px;
            background: #fff;
            border-radius: 20px;
            animation: drift 10s linear infinite;
        }

        .clouds::before, .clouds::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        .clouds::before {
            width: 30px;
            height: 30px;
            top: -15px;
            left: 10px;
        }

        .clouds::after {
            width: 40px;
            height: 25px;
            top: -10px;
            right: 10px;
        }

        @keyframes drift {
            0% { left: -100px; }
            100% { left: 100%; }
        }

        .cloud1 { top: 60px; animation-delay: 0s; }
        .cloud2 { top: 80px; animation-delay: 5s; }

        .hills {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
        }

        .hill {
            position: absolute;
            bottom: 0;
            background: #7cb342;
            border-radius: 50% 50% 0 0;
        }

        .hill1 {
            left: 0;
            width: 35%;
            height: 60%;
        }

        .hill2 {
            left: 20%;
            width: 40%;
            height: 80%;
            background: #689f38;
        }

        .hill3 {
            right: 0;
            width: 45%;
            height: 70%;
        }

        .code-symbol {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            color: #2ecc71;
            font-weight: bold;
        }

        /* Skills Section */
        #skills {
            background: #000;
            color: #fff;
        }

        #skills .section-title {
            color: #2ecc71;
            margin-left: 100px;
        }

        .skills-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 40px;
            padding: 0 100px;
        }

        .skill-icon {
            text-align: center;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .skill-icon:nth-child(1) { animation-delay: 0.1s; }
        .skill-icon:nth-child(2) { animation-delay: 0.2s; }
        .skill-icon:nth-child(3) { animation-delay: 0.3s; }
        .skill-icon:nth-child(4) { animation-delay: 0.4s; }
        .skill-icon:nth-child(5) { animation-delay: 0.5s; }
        .skill-icon:nth-child(6) { animation-delay: 0.6s; }
        .skill-icon:nth-child(7) { animation-delay: 0.7s; }
        .skill-icon:nth-child(8) { animation-delay: 0.8s; }
        .skill-icon:nth-child(9) { animation-delay: 0.9s; }
        .skill-icon:nth-child(10) { animation-delay: 1s; }

        .skill-icon:hover {
            transform: scale(1.2) rotate(5deg);
        }

        .skill-icon img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(46, 204, 113, 0.3));
        }

        /* Certification Section */
        #certification {
            background: #f5f7fa;
        }

        /* Achievements Section */
        #achievements {
            background: #fff;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .achievement-card {
            text-align: justify;
            padding: 30px;
            background: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .achievement-card:nth-child(1) { animation-delay: 0.1s; }
        .achievement-card:nth-child(2) { animation-delay: 0.2s; }
        .achievement-card:nth-child(3) { animation-delay: 0.3s; }
        .achievement-card:nth-child(4) { animation-delay: 0.4s; }
        .achievement-card:nth-child(5) { animation-delay: 0.5s; }

        .achievement-card:hover {
            border-color: #2ecc71;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.2);
        }

        /* Contact Section */
        #contact {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: #fff;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #contact .section-title {
            color: #fff;
        }

        .contact-info {
            font-size: 24px;
            margin: 30px 0;
        }

        .contact-info a {
            color: #fff;
            text-decoration: none;
            border-bottom: 2px solid #fff;
            transition: all 0.3s ease;
        }

        .contact-info a:hover {
            color: #000;
            border-color: #000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav ul {
                flex-wrap: wrap;
                gap: 10px;
            }

            nav a {
                padding: 8px 15px;
                font-size: 12px;
            }

            .home-content h1 {
                font-size: 40px;
            }

            .tagline {
                font-size: 18px;
            }

            .section-title {
                font-size: 50px;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .skills-container {
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
                padding: 0 20px;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>
