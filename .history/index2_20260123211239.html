<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Certificates</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f4f4; margin: 0; padding: 20px; font-family: 'Montserrat', sans-serif; }
        
        /* The main certificate container */
        .cert-container {
            width: 900px;
            height: 600px;
            background-color: #2ecc71; /* Your requested color */
            margin: 0 auto 50px auto;
            padding: 30px;
            border: 15px solid #27ae60; /* Darker green border */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: white;
            position: relative;
            box-sizing: border-box;
            text-align: center;
        }

        .inner-frame {
            border: 2px solid rgba(255,255,255,0.4);
            height: 100%;
            width: 100%;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header { font-size: 55px; font-weight: 700; margin: 0; text-transform: uppercase; letter-spacing: 4px; }
        .sub-header { font-size: 18px; margin: 20px 0; font-weight: 400; letter-spacing: 2px; }
        
        .student-name {
            font-family: 'Playfair Display', serif;
            font-size: 45px;
            margin: 20px 0;
            color: #ffffff;
            border-bottom: 2px solid white;
            display: inline-block;
            padding: 0 40px;
        }

        .description { font-size: 16px; margin: 20px 0; line-height: 1.6; }
        .course-title { font-size: 75px; font-weight: 700; margin: 15px 0; color: #1a2e21; }
        .provider { font-size: 14px; text-transform: uppercase; margin-top: 10px; opacity: 0.9; }

        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            padding: 0 60px;
        }
        .signature-box { border-top: 1px solid white; width: 180px; padding-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="cert-container">
        <div class="inner-frame">
            <h1 class="header">Certificate</h1>
            
            <div class="course-title">Oracle JAVA</div>
           
           
           
        </div>
    </div>

    <div class="cert-container">
        <div class="inner-frame">
           <h1 class="header">Project</h1>
          
            <div class="course-title">LaundryHub</div>
         
            
        </div>
    </div>

    <div class="cert-container">
        <div class="inner-frame">
            <h1 class="header">Project</h1>
        
            <div class="course-title">DanceHub</div>
            
        </div>
    </div>

    <div class="cert-container">
        <div class="inner-frame">
            <h1 class="header">PROJECT</h1>
            
            <div class="course-title">Sololearn: HTML</div>
            
        </div>
    </div>

</body>
</html>
